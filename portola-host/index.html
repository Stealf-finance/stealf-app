<!doctype html>
<!--
  Portola host page (Approach A).

  Deploy this on a Stealf-controlled origin (e.g. https://embed.stealf.xyz/portola)
  and register that origin in the Portola partner portal. The Stealf app loads
  this page in a WebView with ?embed=<embedUrl>. The page mounts Portola's iframe
  and runs the controller, but instead of signing in-page it forwards each `sign`
  request to the native app (window.ReactNativeWebView.postMessage) and exposes
  window.__portolaReply / __portolaReject for the app to inject signatures back.

  See stealf-app/docs/portola-integration.md.
-->
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
    <title>Stealf · Borrow</title>
    <style>
      html, body { margin: 0; height: 100%; background: #000; }
      #portola { width: 100%; height: 100%; border: 0; }
    </style>
  </head>
  <body>
    <iframe
      id="portola"
      allow="clipboard-write; camera"
      sandbox="allow-scripts allow-forms allow-same-origin allow-popups allow-popups-to-escape-sandbox"
    ></iframe>
    <script>
      (function () {
        var embedUrl = new URLSearchParams(location.search).get('embed');
        var iframe = document.getElementById('portola');
        if (!embedUrl) return;
        iframe.src = embedUrl;
        var origin = new URL(embedUrl).origin;

        var reply = function (msg) {
          if (iframe.contentWindow) iframe.contentWindow.postMessage(msg, origin);
        };
        var toNative = function (msg) {
          if (window.ReactNativeWebView) {
            window.ReactNativeWebView.postMessage(JSON.stringify(msg));
          }
        };

        // The native app injects signatures back through these.
        window.__portolaReply = function (data) {
          reply({ portola: 1, kind: 'signed', id: data.id, signatures: data.signatures });
        };
        window.__portolaReject = function (data) {
          reply({ portola: 1, kind: 'rejected', id: data.id, message: data.message });
        };

        window.addEventListener('message', function (e) {
          if (e.source !== iframe.contentWindow || e.origin !== origin) return;
          var d = e.data;
          if (d && typeof d === 'object' && d.portola === 1 && d.kind === 'sign') {
            // Forward to native; the app signs via Turnkey and calls __portolaReply.
            toNative(d);
          } else if (d && (d.type === 'portola:complete' || d.type === 'portola:session_expired')) {
            toNative(d);
          }
        });
      })();
    </script>
  </body>
</html>
